{% extends "base.html" %} {% block title %}Routes — RailBooker{% endblock %} {%
block content %}
<div class="mb-8">
    <h1 class="font-display font-bold text-2xl tracking-tight">Routes</h1>
    <p class="text-zinc-500 text-sm mt-1">
        Manage train routes between stations
    </p>
</div>
<div class="flex items-center justify-between mb-4">
    <span id="rtCount" class="text-zinc-500 text-sm"></span>
    <button
        onclick="openAdd()"
        class="inline-flex items-center gap-2 px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-none transition-colors"
    >
        + Add Route
    </button>
</div>
<div class="bg-zinc-900 border border-zinc-800 rounded-none overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr
                class="bg-zinc-800/60 text-zinc-500 text-xs uppercase tracking-wider"
            >
                <th class="px-4 py-3 text-left font-medium">ID</th>
                <th class="px-4 py-3 text-left font-medium">Departure</th>
                <th class="px-4 py-3 text-left font-medium">Arrival</th>
                <th class="px-4 py-3 text-left font-medium">Train</th>
                <th class="px-4 py-3 text-left font-medium">Departs</th>
                <th class="px-4 py-3 text-left font-medium">Arrives</th>
                <th class="px-4 py-3 text-left font-medium">Actions</th>
            </tr>
        </thead>
        <tbody id="rtBody" class="divide-y divide-zinc-800"></tbody>
    </table>
</div>

<div
    class="modal-backdrop fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none"
    id="rtModal"
>
    <div
        class="modal-box bg-zinc-900 border border-zinc-700 rounded-none p-8 w-full max-w-md translate-y-3 scale-95"
    >
        <div class="flex items-center justify-between mb-6">
            <h3 class="font-display font-bold text-lg" id="rtModalTitle">
                Add Route
            </h3>
            <button
                onclick="closeModal('rtModal')"
                class="text-zinc-500 hover:text-zinc-200 text-xl leading-none"
            >
                &times;
            </button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label
                    class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                    >Departure Station</label
                >
                <select
                    id="f_dep_st"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors"
                ></select>
            </div>
            <div>
                <label
                    class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                    >Arrival Station</label
                >
                <select
                    id="f_arr_st"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors"
                ></select>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label
                    class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                    >Departure Time</label
                >
                <input
                    id="f_dep_time"
                    type="time"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors"
                />
            </div>
            <div>
                <label
                    class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                    >Arrival Time</label
                >
                <input
                    id="f_arr_time"
                    type="time"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors"
                />
            </div>
        </div>
        <div class="mb-6">
            <label
                class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                >Train (optional)</label
            >
            <select
                id="f_train_id"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors"
            >
                <option value="">— None —</option>
            </select>
        </div>
        <div class="flex gap-3 justify-end">
            <button
                onclick="closeModal('rtModal')"
                class="px-4 py-2 text-sm rounded-none border border-zinc-700 text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"
            >
                Cancel
            </button>
            <button
                onclick="saveRt()"
                class="px-4 py-2 text-sm rounded-none bg-violet-600 hover:bg-violet-500 text-white font-medium transition-colors"
            >
                Save
            </button>
        </div>
    </div>
</div>
{% endblock %} {% block scripts %}
<script>
    let routes = [],
        stations = [],
        trains = [],
        editId = null;
    async function load() {
        [routes, stations, trains] = await Promise.all([
            api("/api/routes"),
            api("/api/stations"),
            api("/api/trains"),
        ]);
        document.getElementById("rtCount").textContent =
            `${routes.length} routes`;
        const stOpts = stations
            .map(
                (s) =>
                    `<option value="${s.station_id}">${s.station_name} (${s.city})</option>`,
            )
            .join("");
        document.getElementById("f_dep_st").innerHTML = stOpts;
        document.getElementById("f_arr_st").innerHTML = stOpts;
        document.getElementById("f_train_id").innerHTML =
            '<option value="">— None —</option>' +
            trains
                .map(
                    (t) =>
                        `<option value="${t.train_id}">${t.train_name}</option>`,
                )
                .join("");
        const body = document.getElementById("rtBody");
        if (!routes.length) {
            body.innerHTML = `<tr><td colspan="7"><div class="text-center py-12 text-zinc-600">No routes yet.</div></td></tr>`;
            return;
        }
        body.innerHTML = routes
            .map(
                (r) => `
    <tr class="hover:bg-zinc-800/40 transition-colors">
      <td class="px-4 py-3 text-zinc-600 text-xs">#${r.route_id}</td>
      <td class="px-4 py-3"><div class="font-medium">${r.dep_name}</div><div class="text-xs text-zinc-500">${r.dep_city}</div></td>
      <td class="px-4 py-3"><div class="font-medium">${r.arr_name}</div><div class="text-xs text-zinc-500">${r.arr_city}</div></td>
      <td class="px-4 py-3">${r.train_name ? `<span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-500/15 text-violet-400">${r.train_name}</span>` : '<span class="text-zinc-600">—</span>'}</td>
      <td class="px-4 py-3 text-zinc-300 tabular-nums text-xs">${r.departure_time}</td>
      <td class="px-4 py-3 text-zinc-300 tabular-nums text-xs">${r.arrival_time}</td>
      <td class="px-4 py-3"><div class="flex gap-2">
        <button onclick="openEdit(${r.route_id})" class="px-3 py-1.5 text-xs rounded-md border border-zinc-700 text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">Edit</button>
        <button onclick="del(${r.route_id})" class="px-3 py-1.5 text-xs rounded-md border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-colors">Delete</button>
      </div></td>
    </tr>
  `,
            )
            .join("");
    }
    function openAdd() {
        editId = null;
        document.getElementById("rtModalTitle").textContent = "Add Route";
        document.getElementById("f_dep_time").value = "";
        document.getElementById("f_arr_time").value = "";
        document.getElementById("f_train_id").value = "";
        openModal("rtModal");
    }
    function openEdit(id) {
        const r = routes.find((x) => x.route_id === id);
        editId = id;
        document.getElementById("rtModalTitle").textContent = "Edit Route";
        document.getElementById("f_dep_st").value = r.departure_station_id;
        document.getElementById("f_arr_st").value = r.arrival_station_id;
        document.getElementById("f_dep_time").value = r.departure_time;
        document.getElementById("f_arr_time").value = r.arrival_time;
        document.getElementById("f_train_id").value = r.train_id || "";
        openModal("rtModal");
    }
    async function saveRt() {
        const body = {
            departure_station_id: parseInt(
                document.getElementById("f_dep_st").value,
            ),
            arrival_station_id: parseInt(
                document.getElementById("f_arr_st").value,
            ),
            departure_time: document.getElementById("f_dep_time").value,
            arrival_time: document.getElementById("f_arr_time").value,
            train_id: document.getElementById("f_train_id").value || null,
        };
        if (!body.departure_time || !body.arrival_time) {
            toast("Fill departure and arrival times", "error");
            return;
        }
        if (body.departure_station_id === body.arrival_station_id) {
            toast("Departure and arrival must differ", "error");
            return;
        }
        if (editId) await api(`/api/routes/${editId}`, "PUT", body);
        else await api("/api/routes", "POST", body);
        closeModal("rtModal");
        toast(editId ? "Route updated" : "Route added");
        load();
    }
    function del(id) {
        showConfirm("Delete this route?", async () => {
            await api(`/api/routes/${id}`, "DELETE");
            toast("Route deleted");
            load();
        });
    }
    load();
</script>
{% endblock %}
