{% extends "base.html" %} {% block title %}Trains — RailBooker{% endblock %} {%
block content %}
<div class="mb-8">
    <h1 class="font-display font-bold text-2xl tracking-tight">Trains</h1>
    <p class="text-zinc-500 text-sm mt-1">Manage your train fleet</p>
</div>

<div class="flex items-center justify-between mb-4">
    <span id="trainCount" class="text-zinc-500 text-sm"></span>
    <button
        onclick="openAdd()"
        class="inline-flex items-center gap-2 px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-none transition-colors"
    >
        + Add Train
    </button>
</div>

<div class="bg-zinc-900 border border-zinc-800 rounded-none overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr
                class="bg-zinc-800/60 text-zinc-500 text-xs uppercase tracking-wider"
            >
                <th class="px-4 py-3 text-left font-medium">ID</th>
                <th class="px-4 py-3 text-left font-medium">Name</th>
                <th class="px-4 py-3 text-left font-medium">Type</th>
                <th class="px-4 py-3 text-left font-medium">Seats</th>
                <th class="px-4 py-3 text-left font-medium">Price</th>
                <th class="px-4 py-3 text-left font-medium">Actions</th>
            </tr>
        </thead>
        <tbody id="trainBody" class="divide-y divide-zinc-800"></tbody>
    </table>
</div>

<!-- train modal -->
<div
    class="modal-backdrop fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200"
    id="trainModal"
>
    <div
        class="modal-box bg-zinc-900 border border-zinc-700 rounded-none p-8 w-full max-w-md translate-y-3 scale-95 transition-all duration-200"
        id="trainModalBox"
    >
        <div class="flex items-center justify-between mb-6">
            <h3 class="font-display font-bold text-lg" id="trainModalTitle">
                Add Train
            </h3>
            <button
                onclick="closeModal('trainModal')"
                class="text-zinc-500 hover:text-zinc-200 text-xl leading-none"
            >
                &times;
            </button>
        </div>
        <div class="mb-4">
            <label
                class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                >Train Name</label
            >
            <input
                id="f_train_name"
                placeholder="Express 101"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors text-white"
            />
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label
                    class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                    >Type</label
                >
                <select
                    id="f_train_type"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors text-white"
                >
                    <option>Express</option>
                    <option>Regional</option>
                    <option>Night</option>
                    <option>Intercity</option>
                </select>
            </div>
            <div>
                <label
                    class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                    >Total Seats</label
                >
                <input
                    id="f_total_seats"
                    type="number"
                    placeholder="200"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors text-white"
                />
            </div>
        </div>
        <div class="mb-6">
            <label
                class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5"
                >Ticket Price ($)</label
            >
            <input
                id="f_ticket_price"
                type="number"
                step="0.01"
                placeholder="25.00"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-none px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500 transition-colors text-white"
            />
        </div>
        <div class="flex gap-3 justify-end">
            <button
                onclick="closeModal('trainModal')"
                class="px-4 py-2 text-sm rounded-none border border-zinc-700 text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors"
            >
                Cancel
            </button>
            <button
                onclick="saveTrain()"
                class="px-4 py-2 text-sm rounded-none bg-violet-600 hover:bg-violet-500 text-white font-medium transition-colors"
            >
                Save
            </button>
        </div>
    </div>
</div>
{% endblock %} {% block scripts %}
<script>
    let trains = [],
        editId = null;
    const typeBadge = (t) =>
        ({
            Express: "bg-violet-500/15 text-violet-400",
            Regional: "bg-amber-500/15 text-amber-400",
            Night: "bg-zinc-500/15 text-zinc-400",
            Intercity: "bg-sky-500/15 text-sky-400",
        })[t] || "bg-zinc-500/15 text-zinc-400";

    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        const box = document.getElementById(modalId + "Box");
        modal.classList.remove("opacity-0", "pointer-events-none");
        modal.classList.add("opacity-100");
        if (box) {
            box.classList.remove("translate-y-3", "scale-95");
            box.classList.add("translate-y-0", "scale-100");
        }
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        const box = document.getElementById(modalId + "Box");
        modal.classList.remove("opacity-100");
        modal.classList.add("opacity-0", "pointer-events-none");
        if (box) {
            box.classList.remove("translate-y-0", "scale-100");
            box.classList.add("translate-y-3", "scale-95");
        }
    }

    async function api(url, method = "GET", body = null) {
        const options = { method, headers: {} };
        if (body) {
            options.headers["Content-Type"] = "application/json";
            options.body = JSON.stringify(body);
        }
        const res = await fetch(url, options);
        return res.json();
    }

    function toast(msg, type = "success") {
        console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    function showConfirm(msg, callback) {
        if (confirm(msg)) callback();
    }

    async function load() {
        trains = await api("/api/trains");
        document.getElementById("trainCount").textContent =
            `${trains.length} trains`;
        const body = document.getElementById("trainBody");
        if (!trains.length) {
            body.innerHTML = `<tr><td colspan="6"><div class="text-center py-12 text-zinc-600">No trains yet. Add one!</div></td></tr>`;
            return;
        }
        body.innerHTML = trains
            .map(
                (t) => `
    <tr class="hover:bg-zinc-800/40 transition-colors">
      <td class="px-4 py-3 text-zinc-600 text-xs">#${t.train_id}</td>
      <td class="px-4 py-3 font-medium">${t.train_name}</td>
      <td class="px-4 py-3"><span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium ${typeBadge(t.train_type)}">${t.train_type}</span></td>
      <td class="px-4 py-3 text-zinc-300">${t.total_seats}</td>
      <td class="px-4 py-3 text-zinc-300">$${parseFloat(t.ticket_price).toFixed(2)}</td>
      <td class="px-4 py-3">
        <div class="flex gap-2">
          <button onclick="openEdit(${t.train_id})" class="px-3 py-1.5 text-xs rounded-md border border-zinc-700 text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">Edit</button>
          <button onclick="del(${t.train_id},'${t.train_name.replace(/'/g, "\\'")}')" class="px-3 py-1.5 text-xs rounded-md border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-colors">Delete</button>
        </div>
      </td>
    </tr>
  `,
            )
            .join("");
    }

    function openAdd() {
        editId = null;
        document.getElementById("trainModalTitle").textContent = "Add Train";
        ["f_train_name", "f_total_seats", "f_ticket_price"].forEach(
            (id) => (document.getElementById(id).value = ""),
        );
        document.getElementById("f_train_type").value = "Express";
        openModal("trainModal");
    }
    function openEdit(id) {
        const t = trains.find((x) => x.train_id === id);
        editId = id;
        document.getElementById("trainModalTitle").textContent = "Edit Train";
        document.getElementById("f_train_name").value = t.train_name;
        document.getElementById("f_train_type").value = t.train_type;
        document.getElementById("f_total_seats").value = t.total_seats;
        document.getElementById("f_ticket_price").value = t.ticket_price;
        openModal("trainModal");
    }
    async function saveTrain() {
        const body = {
            train_name: document.getElementById("f_train_name").value,
            train_type: document.getElementById("f_train_type").value,
            total_seats: parseInt(
                document.getElementById("f_total_seats").value,
            ),
            ticket_price: parseFloat(
                document.getElementById("f_ticket_price").value,
            ),
        };
        if (!body.train_name || !body.total_seats || isNaN(body.ticket_price)) {
            toast("Fill all fields", "error");
            return;
        }
        if (editId) await api(`/api/trains/${editId}`, "PUT", body);
        else await api("/api/trains", "POST", body);
        closeModal("trainModal");
        toast(editId ? "Train updated" : "Train added");
        load();
    }
    function del(id, name) {
        showConfirm(`Delete train "${name}"?`, async () => {
            await api(`/api/trains/${id}`, "DELETE");
            toast("Train deleted");
            load();
        });
    }
    load();
</script>
{% endblock %}
