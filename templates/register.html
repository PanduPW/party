{% extends "base.html" %} {% block title %}Create Profile — RailBooker{%
endblock %} {% block content %}
<div
    class="min-h-[80vh] flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
    <div
        class="max-w-md w-full bg-white border border-zinc-200 rounded-none p-8 shadow-sm"
    >
        <!-- Header Heading Block -->
        <div class="mb-8 text-center sm:text-left">
            <h1
                class="font-display font-bold text-2xl tracking-tight text-zinc-950"
            >
                Create Account
            </h1>
            <p class="text-zinc-500 text-sm mt-1">
                Register a new commuter account and transit profile.
            </p>
        </div>

        <!-- Dynamic Form -->
        <form action="/register" method="POST" class="space-y-5">
            <!-- Grid for First & Last Name -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label
                        for="firstName"
                        class="block font-display font-semibold text-xs text-zinc-700 uppercase tracking-wider mb-2"
                    >
                        First Name
                    </label>
                    <input
                        id="firstName"
                        name="first_name"
                        type="text"
                        required
                        placeholder="Bambang"
                        class="w-full px-4 py-3 text-sm rounded-none border border-zinc-200 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all outline-none"
                    />
                </div>
                <div>
                    <label
                        for="lastName"
                        class="block font-display font-semibold text-xs text-zinc-700 uppercase tracking-wider mb-2"
                    >
                        Last Name
                    </label>
                    <input
                        id="lastName"
                        name="last_name"
                        type="text"
                        required
                        placeholder="Pamungkas"
                        class="w-full px-4 py-3 text-sm rounded-none border border-zinc-200 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all outline-none"
                    />
                </div>
            </div>

            <!-- Phone Number -->
            <div>
                <label
                    for="phoneNo"
                    class="block font-display font-semibold text-xs text-zinc-700 uppercase tracking-wider mb-2"
                >
                    Phone Number
                </label>
                <input
                    id="phoneNo"
                    name="phone_no"
                    type="tel"
                    placeholder="081234567890"
                    class="w-full px-4 py-3 text-sm rounded-none border border-zinc-200 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all outline-none"
                />
            </div>

            <hr class="border-zinc-200 my-4" />

            <!-- Email Address -->
            <div>
                <label
                    for="email"
                    class="block font-display font-semibold text-xs text-zinc-700 uppercase tracking-wider mb-2"
                >
                    Email Address
                </label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    required
                    placeholder="name@example.com"
                    class="w-full px-4 py-3 text-sm rounded-none border border-zinc-200 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all outline-none"
                />
            </div>

            <!-- Password -->
            <div>
                <label
                    for="password"
                    class="block font-display font-semibold text-xs text-zinc-700 uppercase tracking-wider mb-2"
                >
                    Password
                </label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    placeholder="••••••••"
                    class="w-full px-4 py-3 text-sm rounded-none border border-zinc-200 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all outline-none"
                />
            </div>

            <div class="pt-2">
                <button
                    type="submit"
                    class="w-full bg-zinc-900 text-white font-medium text-sm py-3 px-4 border border-zinc-950 hover:bg-zinc-800 transition-colors duration-150 focus:outline-none font-display uppercase tracking-wider"
                >
                    Register Account
                </button>
            </div>
        </form>

        <!-- Redirection link -->
        <div class="mt-6 pt-6 border-t border-zinc-100 text-center text-sm">
            <p class="text-zinc-500">
                Already have an account?
                <a
                    href="/login"
                    class="font-medium text-violet-600 hover:text-violet-700 hover:underline transition-colors ml-1"
                >
                    Sign in here →
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %} {% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const registerForm = document.querySelector("form");

        if (registerForm) {
            registerForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const payload = {
                    first_name: document
                        .getElementById("firstName")
                        .value.trim(),
                    last_name: document.getElementById("lastName").value.trim(),
                    phone_no:
                        document.getElementById("phoneNo").value.trim() || null,
                    email: document.getElementById("email").value.trim(),
                    password: document.getElementById("password").value,
                };

                // Simple client side string checking validation
                if (
                    !payload.first_name ||
                    !payload.last_name ||
                    !payload.email ||
                    !payload.password
                ) {
                    toast("Please fill in all required fields.", "error");
                    return;
                }

                try {
                    const response = await api("/register", "POST", payload);

                    if (response.error) {
                        toast(response.error, "error");
                    } else if (response.ok && response.redirect) {
                        toast(
                            "Account created successfully! Logging you in...",
                            "success",
                        );
                        setTimeout(() => {
                            window.location.href = response.redirect;
                        }, 1000);
                    }
                } catch (err) {
                    console.error("Registration Error:", err);
                    toast("Connection lost. Please try again.", "error");
                }
            });
        }
    });
</script>
{% endblock %}
