{% extends "base.html" %}
{% block title %}Dashboard — RailBooker{% endblock %}
{% block content %}
<div class="mb-8">
  <h1 class="font-display font-bold text-2xl tracking-tight">Dashboard</h1>
  <p class="text-zinc-500 text-sm mt-1">Overview of your railway booking system</p>
</div>

<div id="stats" class="grid grid-cols-4 gap-4 mb-10"></div>

<div class="grid grid-cols-2 gap-6">
  <div>
    <h2 class="font-display font-semibold text-sm text-zinc-300 mb-3 uppercase tracking-wider">Recent Purchases</h2>
    <div id="recentPurchases" class="bg-zinc-900 border border-zinc-800 rounded-none overflow-hidden"></div>
  </div>
  <div>
    <h2 class="font-display font-semibold text-sm text-zinc-300 mb-3 uppercase tracking-wider">Available Routes</h2>
    <div id="routesList" class="bg-zinc-900 border border-zinc-800 rounded-none overflow-hidden"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadDash() {
  const [purchases, routes] = await Promise.all([api('/api/purchases'), api('/api/routes')]);
  const pending = purchases.filter(p=>p.status==='pending').length;
  const paid = purchases.filter(p=>p.status==='paid').length;
  const revenue = purchases.filter(p=>p.status==='paid').reduce((a,p)=>a+(p.ticket_price||0),0);

  const stats = [
    { label: 'Total Bookings', val: purchases.length, color: 'text-violet-400' },
    { label: 'Pending', val: pending, color: 'text-amber-400' },
    { label: 'Paid', val: paid, color: 'text-emerald-400' },
    { label: 'Revenue', val: '$'+revenue.toFixed(2), color: 'text-zinc-100' },
  ];
  document.getElementById('stats').innerHTML = stats.map(s=>`
    <div class="bg-zinc-900 border border-zinc-800 rounded-none p-5">
      <div class="text-xs text-zinc-500 uppercase tracking-wider font-medium mb-2">${s.label}</div>
      <div class="font-display font-bold text-3xl ${s.color}">${s.val}</div>
    </div>
  `).join('');

  const statusBadge = s => ({
    pending: 'bg-blue-500/15 text-blue-400',
    paid: 'bg-emerald-500/15 text-emerald-400',
    canceled: 'bg-red-500/15 text-red-400'
  }[s] || '');

  const recent = purchases.slice(0,5);
  document.getElementById('recentPurchases').innerHTML = recent.length ? `
    <table class="w-full text-sm">
      <thead><tr class="bg-zinc-800/60 text-zinc-500 text-xs uppercase tracking-wider">
        <th class="px-4 py-3 text-left font-medium">Passenger</th>
        <th class="px-4 py-3 text-left font-medium">Route</th>
        <th class="px-4 py-3 text-left font-medium">Status</th>
      </tr></thead>
      <tbody class="divide-y divide-zinc-800">
      ${recent.map(p=>`<tr class="hover:bg-zinc-800/40">
        <td class="px-4 py-3">${p.first_name} ${p.last_name}</td>
        <td class="px-4 py-3 text-zinc-400 text-xs">${p.dep_name} → ${p.arr_name}</td>
        <td class="px-4 py-3"><span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium ${statusBadge(p.status)}">${p.status}</span></td>
      </tr>`).join('')}
      </tbody>
    </table>
  ` : `<div class="text-center py-12 text-zinc-600"><p>No purchases yet</p></div>`;

  document.getElementById('routesList').innerHTML = routes.length ? `
    <table class="w-full text-sm">
      <thead><tr class="bg-zinc-800/60 text-zinc-500 text-xs uppercase tracking-wider">
        <th class="px-4 py-3 text-left font-medium">From → To</th>
        <th class="px-4 py-3 text-left font-medium">Train</th>
        <th class="px-4 py-3 text-left font-medium">Departs</th>
      </tr></thead>
      <tbody class="divide-y divide-zinc-800">
      ${routes.map(r=>`<tr class="hover:bg-zinc-800/40">
        <td class="px-4 py-3">${r.dep_name}<span class="text-zinc-500 mx-1">→</span>${r.arr_name}</td>
        <td class="px-4 py-3 text-zinc-400 text-xs">${r.train_name||'—'}</td>
        <td class="px-4 py-3 text-zinc-400 text-xs tabular-nums">${r.departure_time}</td>
      </tr>`).join('')}
      </tbody>
    </table>
  ` : `<div class="text-center py-12 text-zinc-600"><p>No routes</p></div>`;
}
loadDash();
</script>
{% endblock %}
